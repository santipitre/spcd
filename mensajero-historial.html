<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Mi historial · SP·CD</title>
  <meta name="theme-color" content="#0F172A"/>
  <link rel="stylesheet" href="spcd-theme.css"/>
<style>
  html,body{ min-height:100vh; }
  body{
    margin:0; padding:0;
    background:linear-gradient(180deg, #0F172A 0%, #1E293B 100%);
    color:#E2E8F0; font-family:'Inter', sans-serif;
  }
  .container{ max-width:480px; margin:0 auto; padding:20px; }

  .topcard{
    background:rgba(15,23,42,.75); backdrop-filter:blur(14px);
    border:1px solid rgba(34,219,174,.3);
    border-radius:18px; padding:22px 20px;
    margin-bottom:18px;
    box-shadow:0 30px 80px rgba(0,0,0,.4);
  }
  .logo{
    text-align:center; font-family:'Rajdhani', sans-serif; font-weight:700;
    letter-spacing:4px; font-size:24px; color:#22DBAE;
  }
  .subtitle{
    text-align:center; font-size:11px; letter-spacing:2px;
    color:#64748B; text-transform:uppercase; margin-bottom:18px;
  }

  h2{ font-family:'Rajdhani',sans-serif; font-size:16px; letter-spacing:2px; color:#22DBAE; margin:0 0 14px; text-transform:uppercase; text-align:center; }

  .form-field{ margin-bottom:12px; }
  .form-field label{ display:block; font-size:10px; letter-spacing:2px; color:#64748B; text-transform:uppercase; margin-bottom:6px; }
  select, input{
    width:100%; box-sizing:border-box;
    background:rgba(15,23,42,.7); border:1px solid rgba(59,130,246,.3);
    border-radius:8px; padding:12px;
    color:#E2E8F0; font-family:'Inter',sans-serif; font-size:14px;
  }
  input.pin{
    text-align:center; font-family:'Rajdhani',sans-serif; font-weight:700;
    font-size:28px; letter-spacing:12px;
    border-width:2px; border-color:rgba(34,219,174,.3);
  }
  input:focus, select:focus{ outline:none; border-color:#22DBAE; }

  .btn{
    width:100%; padding:14px;
    background:linear-gradient(135deg, #22DBAE, #0891B2);
    color:#0F172A; font-family:'Rajdhani', sans-serif;
    font-size:14px; font-weight:700; letter-spacing:3px;
    border:none; border-radius:10px; cursor:pointer;
    transition:all .2s; text-transform:uppercase;
  }
  .btn:hover{ transform:translateY(-1px); }
  .btn:disabled{ opacity:.5; }

  .btn-out{
    width:auto; padding:6px 14px; background:transparent;
    color:#64748B; border:1px solid rgba(100,116,139,.4); border-radius:6px;
    font-size:11px; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer;
  }
  .btn-out:hover{ color:#EF4444; border-color:rgba(239,68,68,.4); }

  .stat-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
  .stat{ background:rgba(15,23,42,.5); border:1px solid rgba(59,130,246,.15); border-radius:10px; padding:10px 12px; text-align:center; }
  .stat-lbl{ font-size:9px; letter-spacing:1.5px; color:#64748B; text-transform:uppercase; }
  .stat-val{ font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; line-height:1.1; margin-top:3px; color:#22DBAE; }

  .retiro-card{
    background:rgba(15,23,42,.6);
    border:1px solid rgba(59,130,246,.18);
    border-radius:12px; padding:14px 16px; margin-bottom:10px;
  }
  .retiro-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .retiro-fecha{ font-size:11px; color:#64748B; letter-spacing:1px; text-transform:uppercase; }
  .badge{ display:inline-block; padding:2px 10px; border-radius:99px; font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
  .b-firmado{ background:rgba(85,231,139,.15); color:#55E78B; border:1px solid rgba(85,231,139,.4); }
  .b-asistida{ background:rgba(56,189,248,.15); color:#38BDF8; border:1px solid rgba(56,189,248,.4); }
  .b-pendiente{ background:rgba(251,191,36,.15); color:#FBBF24; border:1px solid rgba(251,191,36,.4); }
  .b-expirado{ background:rgba(100,116,139,.15); color:#94A3B8; border:1px solid rgba(100,116,139,.4); }
  .b-anulado{ background:rgba(239,68,68,.15); color:#F87171; border:1px solid rgba(239,68,68,.4); }

  .retiro-row{ display:flex; justify-content:space-between; font-size:13px; padding:3px 0; }
  .retiro-row span:first-child{ color:#64748B; font-size:11px; letter-spacing:1px; text-transform:uppercase; }
  .retiro-monto{ font-family:'Rajdhani',sans-serif; font-size:18px; font-weight:700; color:#22DBAE; }

  .alert{ padding:12px; border-radius:10px; font-size:13px; margin-bottom:12px; }
  .alert-error{ background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.4); color:#F87171; }
  .alert-info{ background:rgba(56,189,248,.1); border:1px solid rgba(56,189,248,.4); color:#38BDF8; }

  .empty{ text-align:center; padding:40px 20px; color:#64748B; }
  .empty .ico{ font-size:42px; opacity:.5; margin-bottom:10px; }

  .topbar-actions{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .greeting{ font-family:'Rajdhani',sans-serif; font-size:18px; color:#E2E8F0; letter-spacing:1px; }
  .greeting b{ color:#22DBAE; }

  .spinner{ display:inline-block; width:14px; height:14px; border:2px solid rgba(34,219,174,.3); border-top-color:#22DBAE; border-radius:50%; animation:spin .8s linear infinite; vertical-align:middle; margin-right:6px; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="container">
  <div class="topcard">
    <div class="logo">SP·CD</div>
    <div class="subtitle">Mi historial de retiros</div>
    <div id="root">
      <div style="text-align:center; padding:30px 0; color:#64748B;">
        <span class="spinner"></span> Cargando...
      </div>
    </div>
  </div>
</div>

<script src="spcd-supabase.js?v=2"></script>
<script>
const fmtARS = n => '$' + Number(n||0).toLocaleString('es-AR', {minimumFractionDigits:0, maximumFractionDigits:2});
const fmtFechaHora = ts => new Date(ts).toLocaleString('es-AR', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'});

const STORAGE_KEY = 'spcd_mensajero_session';

const BADGE = {
  'FIRMADO': {txt:'Firmado', cls:'b-firmado'},
  'FIRMA_ASISTIDA': {txt:'Firma asistida', cls:'b-asistida'},
  'PENDIENTE_FIRMA': {txt:'Pendiente', cls:'b-pendiente'},
  'EXPIRADO': {txt:'Expirado', cls:'b-expirado'},
  'ANULADO': {txt:'Anulado', cls:'b-anulado'}
};

let mensajeros = [];
let mensajeroActivo = null;

window.addEventListener('DOMContentLoaded', async () => {
  // ¿hay sesión guardada?
  const guardada = leerSesion();
  if (guardada){
    await cargarHistorial(guardada.id, guardada.pin, guardada.nombre);
    return;
  }
  // si vino mid en query, preselect
  const params = new URLSearchParams(location.search);
  const mid = params.get('mid');
  await cargarMensajeros();
  renderLogin(mid);
});

async function cargarMensajeros(){
  try { mensajeros = await sbQuery('mensajeros', 'select=id,nombre&activo=eq.true&order=nombre.asc'); }
  catch(e){ mensajeros = []; }
}

function renderLogin(midPreselect){
  const opts = mensajeros.map(m => `<option value="${m.id}" ${m.id===midPreselect?'selected':''}>${m.nombre}</option>`).join('');
  document.getElementById('root').innerHTML = `
    <h2>Identificate</h2>
    <div class="form-field">
      <label>¿Quién sos?</label>
      <select id="sel-mensajero">
        <option value="">— Seleccionar —</option>
        ${opts}
      </select>
    </div>
    <div class="form-field">
      <label>Tu PIN</label>
      <input class="pin" id="inp-pin" type="password" maxlength="6" inputmode="numeric" placeholder="••••" autocomplete="off"/>
    </div>
    <div id="login-msg"></div>
    <button class="btn" onclick="login()">Entrar</button>
  `;
  document.getElementById('inp-pin').addEventListener('keypress', e => { if (e.key==='Enter') login(); });
}

async function login(){
  const mid = document.getElementById('sel-mensajero').value;
  const pin = document.getElementById('inp-pin').value.trim();
  const msg = document.getElementById('login-msg');
  msg.innerHTML = '';
  if (!mid){ msg.innerHTML = '<div class="alert alert-error">Seleccioná tu nombre</div>'; return; }
  if (pin.length < 4){ msg.innerHTML = '<div class="alert alert-error">PIN inválido</div>'; return; }
  const m = mensajeros.find(x => x.id === mid);
  await cargarHistorial(mid, pin, m ? m.nombre : '');
}

async function cargarHistorial(mensajeroId, pin, nombre){
  document.getElementById('root').innerHTML = `<div style="text-align:center; padding:30px 0; color:#64748B;"><span class="spinner"></span> Cargando historial...</div>`;
  try {
    const res = await sbRpc('mis_retiros_mensajero', { p_mensajero_id: mensajeroId, p_pin: pin, p_limit: 50 });
    if (!res || !res.ok){
      const err = res?.error || 'desconocido';
      let mensaje = 'Error al cargar.';
      if (err === 'PIN_INCORRECTO') mensaje = 'PIN incorrecto.';
      else if (err === 'BLOQUEADO_TEMPORALMENTE') mensaje = 'Tu PIN está bloqueado por demasiados intentos. Esperá 5 minutos o pediále al encargado.';
      else if (err === 'MENSAJERO_INACTIVO') mensaje = 'Tu cuenta está inactiva.';
      borrarSesion();
      await cargarMensajeros();
      renderLogin(mensajeroId);
      document.getElementById('login-msg').innerHTML = `<div class="alert alert-error">${mensaje}</div>`;
      return;
    }
    // OK
    guardarSesion({ id: mensajeroId, pin, nombre: res.mensajero_nombre || nombre });
    mensajeroActivo = { id: mensajeroId, pin, nombre: res.mensajero_nombre || nombre };
    renderHistorial(res.retiros || []);
  } catch(e){
    document.getElementById('root').innerHTML = `<div class="alert alert-error">Error de conexión: ${e.message}</div>
      <button class="btn" onclick="location.reload()">Reintentar</button>`;
  }
}

function renderHistorial(retiros){
  const totalFirmados = retiros.filter(r => r.estado === 'FIRMADO' || r.estado === 'FIRMA_ASISTIDA').length;
  const montoTotal = retiros.filter(r => r.estado === 'FIRMADO' || r.estado === 'FIRMA_ASISTIDA').reduce((s,r) => s + Number(r.monto_total||0), 0);

  const cards = retiros.length
    ? retiros.map(r => {
        const b = BADGE[r.estado] || {txt:r.estado, cls:'b-pendiente'};
        return `<div class="retiro-card">
          <div class="retiro-head">
            <div class="retiro-fecha">${fmtFechaHora(r.fecha_hora)}</div>
            <span class="badge ${b.cls}">${b.txt}</span>
          </div>
          <div class="retiro-row"><span>Destino</span><span><b>${r.destino || '—'}</b></span></div>
          <div class="retiro-row"><span>Cajas</span><span>${r.cant_cajas}</span></div>
          <div class="retiro-row"><span>Sobres</span><span>${r.cant_sobres}</span></div>
          <div class="retiro-row"><span>Monto</span><span class="retiro-monto">${fmtARS(r.monto_total)}</span></div>
          ${r.firmado_at ? `<div class="retiro-row"><span>Firmado</span><span style="font-size:11px; color:#94A3B8;">${fmtFechaHora(r.firmado_at)}</span></div>` : ''}
          <div class="retiro-row"><span>Encargado de entrega</span><span style="font-size:11px;">${r.encargado || '—'}</span></div>
        </div>`;
      }).join('')
    : `<div class="empty"><div class="ico">📭</div>Todavía no tenés retiros registrados</div>`;

  document.getElementById('root').innerHTML = `
    <div class="topbar-actions">
      <div class="greeting">Hola <b>${mensajeroActivo.nombre}</b></div>
      <button class="btn-out" onclick="logout()">Salir</button>
    </div>
    <div class="stat-grid">
      <div class="stat"><div class="stat-lbl">Retiros firmados</div><div class="stat-val">${totalFirmados}</div></div>
      <div class="stat"><div class="stat-lbl">Total movido</div><div class="stat-val">${fmtARS(montoTotal)}</div></div>
    </div>
    <h2 style="text-align:left; font-size:13px;">Últimos retiros</h2>
    ${cards}
  `;
}

function logout(){
  borrarSesion();
  mensajeroActivo = null;
  cargarMensajeros().then(() => renderLogin(null));
}

// Sesión local (solo localStorage, no es seguro pero es comodidad)
function guardarSesion(s){ try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch(e){} }
function leerSesion(){ try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); } catch(e){ return null; } }
function borrarSesion(){ try { localStorage.removeItem(STORAGE_KEY); } catch(e){} }
</script>
</body>
</html>
