<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Firmar retiro · SP·CD</title>
  <meta name="theme-color" content="#0F172A"/>
  <link rel="stylesheet" href="spcd-theme.css"/>
<style>
  html,body{ min-height:100vh; }
  body{
    margin:0; padding:0;
    background:linear-gradient(180deg, #0F172A 0%, #1E293B 100%);
    color:#E2E8F0; font-family:'Inter', sans-serif;
    display:flex; align-items:center; justify-content:center;
    padding:20px;
  }
  .card{
    width:100%; max-width:420px;
    background:rgba(15,23,42,.75); backdrop-filter:blur(14px);
    border:1px solid rgba(34,219,174,.3);
    border-radius:18px; padding:26px 22px;
    box-shadow:0 30px 80px rgba(0,0,0,.5);
  }
  .logo{
    text-align:center;
    font-family:'Rajdhani', sans-serif; font-weight:700; letter-spacing:4px;
    font-size:24px; color:#22DBAE; margin-bottom:4px;
  }
  .subtitle{
    text-align:center; font-size:11px; letter-spacing:2px;
    color:#64748B; text-transform:uppercase; margin-bottom:22px;
  }

  h2{ font-family:'Rajdhani',sans-serif; font-size:18px; letter-spacing:2px; color:#22DBAE; margin:0 0 14px; text-transform:uppercase; }

  .info-block{
    background:rgba(15,23,42,.5);
    border:1px solid rgba(59,130,246,.2);
    border-radius:12px; padding:16px;
    margin-bottom:18px;
  }
  .info-row{ display:flex; justify-content:space-between; padding:6px 0; font-size:13px; gap:8px; }
  .info-row + .info-row{ border-top:1px dashed rgba(59,130,246,.15); }
  .info-label{ color:#64748B; letter-spacing:1px; text-transform:uppercase; font-size:10px; }
  .info-val{ color:#E2E8F0; font-weight:600; text-align:right; }
  .info-val.highlight{ color:#22DBAE; font-family:'Rajdhani',sans-serif; font-size:18px; }

  .sobres-list{
    margin-top:8px; padding-top:8px;
    border-top:1px dashed rgba(59,130,246,.15);
    font-size:12px; color:#94A3B8;
  }
  .sobres-list .sobre-item{ display:flex; justify-content:space-between; padding:3px 0; }

  .pin-block{ margin-top:14px; }
  .pin-block label{
    display:block; font-size:10px; letter-spacing:2px; color:#64748B;
    text-transform:uppercase; margin-bottom:8px; text-align:center;
  }
  input.pin-input{
    width:100%; box-sizing:border-box;
    background:rgba(15,23,42,.7); border:2px solid rgba(34,219,174,.3);
    border-radius:12px; padding:18px;
    color:#E2E8F0;
    font-family:'Rajdhani', sans-serif; font-weight:700;
    font-size:34px; letter-spacing:14px; text-align:center;
    outline:none; transition:border-color .2s;
  }
  input.pin-input:focus{ border-color:#22DBAE; }

  .btn-firmar{
    width:100%; padding:14px;
    background:linear-gradient(135deg, #22DBAE, #0891B2);
    color:#0F172A; font-family:'Rajdhani', sans-serif;
    font-size:15px; font-weight:700; letter-spacing:3px;
    border:none; border-radius:12px; cursor:pointer;
    margin-top:14px; transition:all .2s;
    box-shadow:0 8px 28px rgba(34,219,174,.3);
    text-transform:uppercase;
  }
  .btn-firmar:hover{ transform:translateY(-1px); box-shadow:0 10px 36px rgba(34,219,174,.45); }
  .btn-firmar:disabled{ opacity:.5; cursor:not-allowed; }

  .alert{
    padding:14px; border-radius:10px;
    font-size:13px; margin-bottom:14px; line-height:1.45;
  }
  .alert-error{ background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.4); color:#F87171; }
  .alert-warn{ background:rgba(251,191,36,.1); border:1px solid rgba(251,191,36,.4); color:#FBBF24; }
  .alert-ok{ background:rgba(85,231,139,.1); border:1px solid rgba(85,231,139,.4); color:#55E78B; text-align:center; }

  .ok-icon{
    text-align:center; font-size:80px; line-height:1;
    color:#22DBAE; margin:18px 0 14px;
  }
  .footer-note{
    text-align:center; font-size:10px; color:#475569;
    margin-top:14px; letter-spacing:1px;
  }

  .historial-link{
    display:block; text-align:center; margin-top:16px;
    color:#64748B; font-size:11px; letter-spacing:1.5px; text-transform:uppercase;
    text-decoration:none;
  }
  .historial-link:hover{ color:#22DBAE; }

  .countdown{
    text-align:center; font-family:'Rajdhani',sans-serif; font-size:14px;
    color:#FBBF24; margin-bottom:12px; letter-spacing:2px;
  }
  .spinner{
    display:inline-block; width:14px; height:14px;
    border:2px solid rgba(34,219,174,.3); border-top-color:#22DBAE;
    border-radius:50%; animation:spin .8s linear infinite;
    vertical-align:middle; margin-right:6px;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="card" id="root">
  <div class="logo">SP·CD</div>
  <div class="subtitle">Mensajería · Firma de retiro</div>
  <div id="content">
    <div style="text-align:center; padding:40px 0; color:#64748B;">
      <span class="spinner"></span> Cargando...
    </div>
  </div>
</div>

<script src="spcd-supabase.js?v=2"></script>

<script>
const params = new URLSearchParams(location.search);
const TOKEN = params.get('token');

const fmtARS = n => '$' + Number(n||0).toLocaleString('es-AR', {minimumFractionDigits:0, maximumFractionDigits:2});
const fmtFechaHora = ts => new Date(ts).toLocaleString('es-AR', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'});

let datosRetiro = null;
let countdownTimer = null;

window.addEventListener('DOMContentLoaded', async () => {
  if (!TOKEN){
    renderError('Link inválido', 'Este link no contiene un token de retiro. Pediále al encargado que te genere uno nuevo.');
    return;
  }
  await cargarRetiro();
});

async function cargarRetiro(){
  try {
    const res = await sbRpc('consultar_retiro_por_token', { p_token: TOKEN });
    if (!res || !res.ok){
      const err = res?.error || 'desconocido';
      if (err === 'TOKEN_INVALIDO') renderError('Token inválido', 'Este QR no corresponde a ningún retiro. Es posible que sea un link viejo.');
      else renderError('Error', err);
      return;
    }
    datosRetiro = res;
    if (res.estado === 'FIRMADO' || res.estado === 'FIRMA_ASISTIDA'){
      renderYaFirmado(res);
      return;
    }
    if (res.estado === 'EXPIRADO' || res.expirado){
      renderError('QR expirado', 'Este código QR ya expiró. Pediále al encargado que te genere uno nuevo.');
      return;
    }
    if (res.estado === 'ANULADO'){
      renderError('Retiro anulado', 'Este retiro fue anulado y no puede firmarse.');
      return;
    }
    renderFormulario(res);
  } catch(e){
    renderError('Error de conexión', e.message);
  }
}

function renderError(titulo, msj){
  document.getElementById('content').innerHTML = `
    <h2>${titulo}</h2>
    <div class="alert alert-error">${msj}</div>
  `;
}

function renderYaFirmado(d){
  document.getElementById('content').innerHTML = `
    <div class="ok-icon">✓</div>
    <div class="alert alert-ok">
      <div style="font-family:'Rajdhani',sans-serif; font-size:18px; font-weight:700; letter-spacing:2px; margin-bottom:6px;">
        YA FIRMADO
      </div>
      <div style="font-size:12px; color:#94A3B8;">
        Este retiro fue firmado el<br>
        <b style="color:#E2E8F0;">${fmtFechaHora(d.firmado_at)}</b>
      </div>
    </div>
    ${renderInfoBlock(d, false)}
  `;
}

function renderFormulario(d){
  const sobresHtml = (d.sobres || []).length
    ? `<div class="sobres-list">
        ${(d.sobres || []).map(s => `<div class="sobre-item"><span>N° ${s.numero_cajera}</span><span>${fmtARS(s.monto)}</span></div>`).join('')}
      </div>`
    : '';

  document.getElementById('content').innerHTML = `
    <h2>Confirmar retiro</h2>
    <div class="countdown" id="cd"></div>
    ${renderInfoBlock(d, true)}
    <div class="pin-block">
      <label>Ingresá tu PIN para firmar</label>
      <input class="pin-input" id="pin" type="password" maxlength="6" inputmode="numeric" autocomplete="off" placeholder="••••" autofocus/>
      <div id="msg-error"></div>
      <button class="btn-firmar" id="btn-firmar" onclick="firmar()">✓ Firmar retiro</button>
    </div>
    <div class="footer-note">Tu firma queda registrada con fecha, hora y dispositivo.</div>
  `;

  // Enter dispara firma
  document.getElementById('pin').addEventListener('keypress', e => {
    if (e.key === 'Enter') firmar();
  });

  iniciarCountdown(new Date(d.expires_at));
}

// Configuración de qué campos mostrar según destino (espejo de mensajeria.html)
function configCamposDestino(nombreDestino){
  const n = (nombreDestino || '').toLowerCase().trim();
  if (n === 'facturación' || n === 'facturacion') return { cajas:true,  sobres:false, monto:false };
  if (n === 'tesorería'   || n === 'tesoreria')   return { cajas:false, sobres:true,  monto:true  };
  // Otros (catch-all): solo observaciones
  return { cajas:false, sobres:false, monto:false };
}

function renderInfoBlock(d, soloLectura){
  const cfg = configCamposDestino(d.destino_nombre);

  const cajasRow = cfg.cajas
    ? `<div class="info-row"><span class="info-label">Cajas</span><span class="info-val">${d.cant_cajas}</span></div>`
    : '';

  const sobresRow = cfg.sobres
    ? `<div class="info-row"><span class="info-label">Sobres</span><span class="info-val">${d.cant_sobres}</span></div>`
    : '';

  const montoRow = cfg.monto
    ? `<div class="info-row"><span class="info-label">Monto total</span><span class="info-val highlight">${fmtARS(d.monto_total)}</span></div>`
    : '';

  const sobresList = (cfg.sobres && (d.sobres || []).length)
    ? `<div class="sobres-list">
        ${(d.sobres || []).map((s,i) => `<div class="sobre-item"><span>${s.numero_cajera || ('Sobre ' + (i+1))}</span><span>${fmtARS(s.monto)}</span></div>`).join('')}
      </div>`
    : '';

  const obsRow = d.observaciones
    ? `<div class="info-row"><span class="info-label">Observaciones</span><span class="info-val" style="font-size:12px;">${d.observaciones}</span></div>`
    : '';

  return `
    <div class="info-block">
      <div class="info-row"><span class="info-label">Mensajero</span><span class="info-val">${d.mensajero_nombre}</span></div>
      <div class="info-row"><span class="info-label">Destino</span><span class="info-val">${d.destino_nombre}</span></div>
      <div class="info-row"><span class="info-label">Encargado de entrega</span><span class="info-val">${d.encargado_nombre}</span></div>
      ${cajasRow}
      ${sobresRow}
      ${montoRow}
      ${sobresList}
      ${obsRow}
    </div>
  `;
}

function iniciarCountdown(expiresAt){
  if (countdownTimer) clearInterval(countdownTimer);
  const cd = document.getElementById('cd');
  const tick = () => {
    const ms = expiresAt - new Date();
    if (ms <= 0){
      cd.textContent = '⚠ QR expirado — pediále al encargado uno nuevo';
      clearInterval(countdownTimer);
      document.getElementById('btn-firmar').disabled = true;
      return;
    }
    const sec = Math.floor(ms/1000);
    const m = Math.floor(sec/60), s = sec % 60;
    cd.textContent = `⏱ Expira en ${m}:${String(s).padStart(2,'0')}`;
  };
  tick();
  countdownTimer = setInterval(tick, 1000);
}

// Guardamos el PIN actual cuando hay que cambiarlo (no se persiste, solo en memoria)
let pinActualMemo = null;

async function firmar(){
  const pin = document.getElementById('pin').value.trim();
  const msg = document.getElementById('msg-error');
  msg.innerHTML = '';
  if (pin.length < 4){
    msg.innerHTML = '<div class="alert alert-error">PIN inválido (mínimo 4 dígitos)</div>';
    return;
  }
  const btn = document.getElementById('btn-firmar');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Verificando...';

  try {
    const res = await sbRpc('firmar_retiro', { p_token: TOKEN, p_pin: pin, p_ip: null });
    if (!res || !res.ok){
      const err = res?.error || 'desconocido';

      // ── Caso especial: el mensajero debe cambiar el PIN antes de firmar ──
      if (err === 'DEBE_CAMBIAR_PIN'){
        pinActualMemo = pin; // recordamos el PIN actual para el cambio
        renderCambioPin();
        return;
      }

      let mensaje = 'No se pudo firmar.';
      if (err === 'PIN_INCORRECTO') mensaje = 'PIN incorrecto. Intentos restantes: ' + (res.intentos_restantes ?? '?');
      else if (err === 'BLOQUEADO_TEMPORALMENTE') mensaje = 'Tu PIN está bloqueado temporalmente por demasiados intentos. Esperá 5 minutos o pediále al encargado que te lo resetee.';
      else if (err === 'EXPIRADO') mensaje = 'El QR expiró. Pediále uno nuevo.';
      else if (err === 'YA_PROCESADO') mensaje = 'Este retiro ya fue firmado.';
      else mensaje = 'Error: ' + err;
      msg.innerHTML = `<div class="alert alert-error">${mensaje}</div>`;
      btn.disabled = false;
      btn.innerHTML = '✓ Firmar retiro';
      document.getElementById('pin').value = '';
      return;
    }
    // ÉXITO
    mostrarFirmaOK();
  } catch(e){
    msg.innerHTML = `<div class="alert alert-error">Error de conexión: ${e.message}</div>`;
    btn.disabled = false;
    btn.innerHTML = '✓ Firmar retiro';
  }
}

// ─── Pantalla de cambio de PIN obligatorio (primera firma) ───
function renderCambioPin(){
  document.getElementById('content').innerHTML = `
    <h2>Primera vez — Cambiá tu PIN</h2>
    <div class="countdown" id="cd"></div>
    <div class="alert alert-info" style="background:rgba(56,189,248,.1); border:1px solid rgba(56,189,248,.4); color:#38BDF8;">
      🔒 Antes de poder firmar, tenés que reemplazar el PIN inicial <b>1234</b> por uno personal de 4 a 6 dígitos. Es solo una vez.
    </div>

    <div class="info-block" style="margin-bottom:18px;">
      <div class="info-row"><span class="info-label">Mensajero</span><span class="info-val">${datosRetiro.mensajero_nombre}</span></div>
      <div class="info-row"><span class="info-label">Destino</span><span class="info-val">${datosRetiro.destino_nombre}</span></div>
    </div>

    <div class="pin-block">
      <label>Nuevo PIN (4 a 6 dígitos)</label>
      <input class="pin-input" id="pin-nuevo" type="password" maxlength="6" inputmode="numeric" autocomplete="off" placeholder="••••" autofocus/>
    </div>
    <div class="pin-block" style="margin-top:14px;">
      <label>Repetí el nuevo PIN</label>
      <input class="pin-input" id="pin-confirmar" type="password" maxlength="6" inputmode="numeric" autocomplete="off" placeholder="••••"/>
    </div>

    <div id="msg-cp"></div>
    <button class="btn-firmar" id="btn-cp" onclick="confirmarCambioYFirmar()">✓ Cambiar PIN y Firmar Retiro</button>
    <div class="footer-note">Tu nuevo PIN va a quedar guardado para todas las futuras firmas.</div>
  `;
  iniciarCountdown(new Date(datosRetiro.expires_at));

  // Enter en el segundo input dispara la acción
  document.getElementById('pin-confirmar').addEventListener('keypress', e => {
    if (e.key === 'Enter') confirmarCambioYFirmar();
  });
}

async function confirmarCambioYFirmar(){
  const nuevo = document.getElementById('pin-nuevo').value.trim();
  const conf  = document.getElementById('pin-confirmar').value.trim();
  const msg   = document.getElementById('msg-cp');
  msg.innerHTML = '';

  if (nuevo.length < 4 || nuevo.length > 6){
    msg.innerHTML = '<div class="alert alert-error">El nuevo PIN debe tener entre 4 y 6 dígitos.</div>'; return;
  }
  if (!/^[0-9]+$/.test(nuevo)){
    msg.innerHTML = '<div class="alert alert-error">El PIN solo puede tener números.</div>'; return;
  }
  if (nuevo === '1234'){
    msg.innerHTML = '<div class="alert alert-error">No podés usar 1234 como nuevo PIN. Elegí uno distinto.</div>'; return;
  }
  if (nuevo !== conf){
    msg.innerHTML = '<div class="alert alert-error">Los PINs no coinciden. Volvé a intentarlo.</div>'; return;
  }
  if (!pinActualMemo){
    msg.innerHTML = '<div class="alert alert-error">Sesión perdida — recargá la página.</div>'; return;
  }

  const btn = document.getElementById('btn-cp');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Procesando...';

  try {
    const res = await sbRpc('cambiar_pin_y_firmar', {
      p_token: TOKEN,
      p_pin_actual: pinActualMemo,
      p_pin_nuevo:  nuevo,
      p_ip: null
    });
    if (!res || !res.ok){
      const err = res?.error || 'desconocido';
      let m = 'No se pudo procesar.';
      if (err === 'PIN_INCORRECTO') m = 'El PIN inicial no es correcto.';
      else if (err === 'PIN_NUEVO_IGUAL_AL_ACTUAL') m = 'El nuevo PIN no puede ser igual al actual.';
      else if (err === 'PIN_NUEVO_NO_PERMITIDO') m = res.detalle || 'No podés usar ese PIN.';
      else if (err === 'PIN_NUEVO_INVALIDO') m = res.detalle || 'PIN nuevo inválido.';
      else if (err === 'BLOQUEADO_TEMPORALMENTE') m = 'Bloqueado por demasiados intentos. Esperá 5 minutos.';
      else if (err === 'EXPIRADO') m = 'El QR expiró. Pediále uno nuevo al encargado.';
      else if (err === 'YA_PROCESADO') m = 'Este retiro ya fue procesado.';
      else m = 'Error: ' + err;
      msg.innerHTML = `<div class="alert alert-error">${m}</div>`;
      btn.disabled = false;
      btn.innerHTML = '✓ Cambiar PIN y Firmar Retiro';
      return;
    }
    pinActualMemo = null;
    mostrarFirmaOK(true);
  } catch(e){
    msg.innerHTML = `<div class="alert alert-error">Error de conexión: ${e.message}</div>`;
    btn.disabled = false;
    btn.innerHTML = '✓ Cambiar PIN y Firmar Retiro';
  }
}

function mostrarFirmaOK(pinFueCambiado){
  if (countdownTimer) clearInterval(countdownTimer);
  const banner = pinFueCambiado
    ? `<div class="alert alert-info" style="margin-bottom:10px;">🔒 PIN actualizado. Recordalo para tus próximas firmas.</div>`
    : '';
  document.getElementById('content').innerHTML = `
    <div class="ok-icon">✓</div>
    <div class="alert alert-ok">
      <div style="font-family:'Rajdhani',sans-serif; font-size:20px; font-weight:700; letter-spacing:3px;">FIRMADO</div>
      <div style="font-size:12px; margin-top:6px; color:#94A3B8;">El retiro quedó registrado correctamente</div>
    </div>
    ${banner}
    ${renderInfoBlock(datosRetiro, false)}
  `;
}
</script>
</body>
</html>
